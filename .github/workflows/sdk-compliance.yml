name: SDK Compliance

on:
  pull_request:
    paths:
      - ".github/workflows/sdk-compliance.yml"
      - "python/**"
      - "tests/compliance/**"
  push:
    branches:
      - dev
      - main
    paths:
      - ".github/workflows/sdk-compliance.yml"
      - "python/**"
      - "tests/compliance/**"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  python-tests:
    name: Python SDK tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: python/pyproject.toml

      - name: Install Python SDK
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ./python pytest

      - name: Run Python tests
        run: |
          PYTHONPATH=python pytest -q python/tests

  python-compliance:
    name: Python SDK compliance
    needs: python-tests
    uses: future-agi/futureagi-sdk-test-harness/.github/workflows/test-sdk.yml@main
    with:
      adapter-dockerfile: tests/compliance/python/Dockerfile
      adapter-context: "."
      report-name: futureagi-sdk-python-compliance-report
